<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词黑客 v5.0：终极入侵</title>
    <style>
        :root {
            --bg-color: #020408;
            --panel-bg: #0d1117;
            --neon-blue: #00f2fe;
            --neon-purple: #7000ff;
            --neon-red: #ff0055;
            --neon-green: #00ff88;
            --text-main: #e6edf3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: box-shadow 0.2s ease;
        }

        /* 赛博网格背景 */
        body::after {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            bottom: 0;
        }

        #terminal {
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            width: 90%;
            max-width: 750px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15);
            position: relative;
            z-index: 5;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--neon-blue);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* 倒计时条 */
        #timer-wrapper { width: 100%; height: 4px; background: #161b22; margin-bottom: 20px; }
        #timer-bar { height: 100%; width: 100%; background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); transition: width 0.1s linear; }

        /* 进度条 */
        #progress-wrapper { width: 100%; height: 8px; background: #161b22; border: 1px solid #30363d; margin-bottom: 30px; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue)); transition: width 0.4s ease; }

        #sentence-display { min-height: 60px; font-size: 1.2rem; color: #8b949e; text-align: center; margin-bottom: 10px; line-height: 1.6; font-style: italic; }
        #target-word { font-size: 3.5rem; text-align: center; margin-bottom: 40px; color: #fff; text-shadow: 0 0 15px var(--neon-blue); font-weight: bold; }

        #options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-opt { background: rgba(255, 255, 255, 0.02); border: 1px solid #30363d; padding: 20px; font-size: 1.5rem; color: var(--text-main); cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .btn-opt:hover:not(:disabled) { border-color: var(--neon-blue); background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); }
        .btn-opt.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--neon-green) !important; color: var(--neon-green); }
        .btn-opt.wrong { background: rgba(255, 0, 85, 0.2) !important; border-color: var(--neon-red) !important; color: var(--neon-red); }

        /* 连击特效层 */
        #combo-overlay {
            position: absolute;
            top: 15%; right: 5%;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            transform: rotate(12deg);
            display: none;
        }
        #combo-text { font-size: 5rem; color: #ffcc00; text-shadow: 0 0 20px #ffcc00, 2px 2px #000; margin: 0; font-weight: 900; }
        #combo-rank { font-size: 1.2rem; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 4px; margin-top: -10px; font-weight: bold; }

        @keyframes combo-pop {
            0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.4) rotate(20deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(12deg); opacity: 0.9; }
        }
        .combo-active { display: block !important; animation: combo-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 漂浮积分动画 */
        .float-pts { position: absolute; color: var(--neon-green); font-weight: bold; font-size: 1.8rem; pointer-events: none; animation: float-up 0.8s ease-out forwards; z-index: 20; }
        @keyframes float-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }

        /* 震动动效 */
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } 100% { transform: translate(0); } }
        .error-shake { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }

        /* 结算界面 */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(2, 4, 8, 0.98); z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .error-table { width: 100%; max-width: 500px; border-collapse: collapse; margin-top: 20px; color: var(--neon-red); }
        .error-table th, .error-table td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        .btn-restart { background: var(--neon-blue); color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="combo-overlay">
        <p id="combo-rank">GOOD!</p>
        <p id="combo-text">X2</p>
    </div>

    <div class="status-bar">
        <span>STATUS: <b id="lvl">01</b>/20</span>
        <span>COMBO: <b id="cmb">0</b></span>
        <span>INTEGRITY: <b id="pts">0</b></span>
    </div>
    
    <div id="timer-wrapper"><div id="timer-bar"></div></div>
    <div id="progress-wrapper"><div id="progress-fill"></div></div>

    <div id="sentence-display">INITIALIZING...</div>
    <div id="target-word">SYNCING</div>

    <div id="options-grid"></div>
</div>

<div id="overlay">
    <h1 style="color:var(--neon-blue); margin-bottom: 5px;">INTRUSION COMPLETE</h1>
    <h2 id="rank-title" style="color:var(--neon-purple); margin-top: 0;"></h2>
    <p id="final-stats" style="font-size: 1.2rem;"></p>
    
    <div id="error-box" style="width: 100%; max-width: 500px; display: none;">
        <p style="color:var(--neon-red); font-weight: bold;">[!] 检测到破损数据碎片 (录入你的系统):</p>
        <table class="error-table" id="err-table">
            <thead><tr><th>单词</th><th>含义</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-restart" onclick="location.reload()">重新载入系统</button>
</div>

<script>
    const wordDB = [
        { en: "difficult", cn: "困难的", s: "English is not _______ if you study hard." },
        { en: "Internet", cn: "互联网", s: "We can find information on the _______." },
        { en: "favorite", cn: "最喜欢的", s: "What is your _______ color?" },
        { en: "worried", cn: "担心的", s: "My mom is _______ about my health." },
        { en: "bookstore", cn: "书店", s: "I want to buy some books in the _______." },
        { en: "invention", cn: "发明", s: "The telephone is a great _______." },
        { en: "stomach", cn: "胃;肚子", s: "I have a _______ ache after eating too much." },
        { en: "injury", cn: "伤害", s: "He stayed in hospital because of a leg _______." },
        { en: "suffer", cn: "忍受;受苦", s: "Many people _______ from cold weather." },
        { en: "safety", cn: "安全", s: "We must think about our _______ first." },
        { en: "patient", cn: "病人;耐心的", s: "The doctor is very kind to every _______." },
        { en: "avoid", cn: "避免", s: "We should _______ making the same mistake." },
        { en: "tonight", cn: "今晚", s: "Are you going to the party _______?" },
        { en: "noise", cn: "噪音", s: "Please don't make so much _______." },
        { en: "description", cn: "描述", s: "Can you give us a _______ of the man?" },
        { en: "environment", cn: "环境", s: "We should protect our _______." },
        { en: "symptom", cn: "症状", s: "Fever is a _______ of a cold." },
        { en: "knife", cn: "刀", s: "Be careful! The _______ is very sharp." },
        { en: "dentist", cn: "牙医", s: "I have a toothache, I need to see a _______." },
        { en: "panic", cn: "恐慌", s: "Don't _______! Everything will be fine." }
    ];

    let score = 0, combo = 0, index = 0, timerInterval, timeLeft = 100, errorLog = [];
    const comboRanks = ["GOOD!", "GREAT!", "EXCELLENT!", "UNSTOPPABLE!", "GODLIKE!"];
    const synth = window.speechSynthesis;

    function speak(txt) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'en-US';
        u.rate = 0.85;
        synth.speak(u);
    }

    function init() {
        wordDB.sort(() => Math.random() - 0.5);
        render();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        timerInterval = setInterval(() => {
            timeLeft -= 1.4; // 约 7 秒一题
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if(timeLeft <= 0) handleResult(false, null);
        }, 100);
    }

    function triggerComboEffect() {
        const overlay = document.getElementById('combo-overlay');
        const text = document.getElementById('combo-text');
        const rank = document.getElementById('combo-rank');

        if (combo >= 2) {
            overlay.classList.remove('combo-active');
            void overlay.offsetWidth; // 重置动画
            overlay.classList.add('combo-active');
            text.innerText = `X${combo}`;
            let rIdx = Math.min(Math.floor((combo - 2) / 2), comboRanks.length - 1);
            rank.innerText = comboRanks[rIdx];
            
            if (combo >= 5) { // 强力连击全屏闪烁
                document.body.style.boxShadow = "inset 0 0 120px rgba(0, 242, 254, 0.6)";
                setTimeout(() => document.body.style.boxShadow = "none", 150);
            }
        }
    }

    function render() {
        if(index >= wordDB.length) { endGame(); return; }
        const data = wordDB[index];
        document.getElementById('target-word').innerText = data.cn;
        document.getElementById('sentence-display').innerText = data.s.replace(data.en, "_______");
        document.getElementById('progress-fill').style.width = (index/wordDB.length)*100 + "%";
        document.getElementById('lvl').innerText = (index + 1).toString().padStart(2, '0');

        let opts = [data.en];
        while(opts.length < 4) {
            let r = wordDB[Math.floor(Math.random()*wordDB.length)].en;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = (e) => handleResult(o === data.en, b, e);
            grid.appendChild(b);
        });
        startTimer();
    }

    function handleResult(isCorrect, btn, event) {
        clearInterval(timerInterval);
        const currentData = wordDB[index];
        const correctWord = currentData.en;
        document.querySelectorAll('.btn-opt').forEach(b => b.disabled = true);

        if(isCorrect) {
            btn.classList.add('correct');
            speak(correctWord);
            combo++;
            let addedPoints = 10 * combo;
            score += addedPoints;
            triggerComboEffect();

            // 弹出积分动画
            const f = document.createElement('div');
            f.className = 'float-pts';
            f.innerText = `+${addedPoints}`;
            f.style.left = `${event.clientX}px`;
            f.style.top = `${event.clientY - 50}px`;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
        } else {
            if (!errorLog.find(e => e.en === correctWord)) errorLog.push({en: correctWord, cn: currentData.cn});
            document.getElementById('terminal').classList.add('error-shake');
            setTimeout(() => document.getElementById('terminal').classList.remove('error-shake'), 300);
            if(btn) btn.classList.add('wrong');
            document.querySelectorAll('.btn-opt').forEach(b => { if(b.innerText === correctWord) b.classList.add('correct'); });
            speak("Error. The word is " + correctWord);
            combo = 0;
            document.getElementById('combo-overlay').classList.remove('combo-active');
        }

        document.getElementById('cmb').innerText = combo;
        document.getElementById('pts').innerText = score;
        setTimeout(() => { index++; render(); }, 1600);
    }

    function endGame() {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('final-stats').innerText = `TOTAL SYSTEM INTEGRITY: ${score}`;
        let title = "RECRUIT HACKER (初级)";
        if(score > 800) title = "CORE INFILTRATOR (渗透者)";
        if(score > 1500) title = "DATA ARCHITECT (架构师)";
        if(score > 2500) title = "OMNIPOTENT OPERATOR (主宰者)";
        document.getElementById('rank-title').innerText = title;

        if(errorLog.length > 0) {
            document.getElementById('error-box').style.display = 'block';
            const body = document.querySelector('#err-table tbody');
            body.innerHTML = '';
            errorLog.forEach(i => { body.innerHTML += `<tr><td>${i.en}</td><td>${i.cn}</td></tr>`; });
        }
    }

    window.onload = init;
</script>
</body>
</html>
