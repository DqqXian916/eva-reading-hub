<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eva's Morning Cafe - 超级通俗版</title>
    <style>
        :root {
            --protein-bg: #fff1e6;
            --protein-text: #b15d1d;
            --protein-border: #f97316;
            --carbs-bg: #eff6ff;
            --carbs-text: #1d4ed8;
            --carbs-border: #60a5fa;
            --fiber-bg: #f5f3ff;
            --fiber-text: #6d28d9;
            --fiber-border: #8b5cf6;
            --slate-800: #1e293b;
            --slate-500: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            /* 将 align-items: center 改为 flex-start，并增加 padding */
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            /* 允许滚动，防止内容被截断 */
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background: white;
            width: 95%;
            /* 改为百分比 */
            max-width: 880px;
            /* 最大保持 880px */
            padding: 30px;
            /* 稍微缩小内边距 */
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            position: relative;
            margin: 0 auto;
            /* 居中 */
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--slate-800);
            margin-bottom: 8px;
            font-size: 30px;
        }

        .subtitle {
            color: var(--slate-500);
            font-size: 16px;
        }

        #toast {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            background: #334155;
            color: white;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            opacity: 0;
            transition: all 0.4s;
            z-index: 100;
        }

        #food-bin {
            border: 3px dashed #cbd5e1;
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            min-height: 90px;
            margin-bottom: 20px;
            background: #f8fafc;
        }

        .food-card {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 22px;
            border-radius: 16px;
            cursor: grab;
            font-weight: 700;
            color: var(--slate-800);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .food-card:hover {
            border-color: #a78bfa;
            transform: translateY(-3px);
        }

        .plates-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .plate {
            border-radius: 35px;
            padding: 20px;
            min-height: 200px;
            border: 3px solid transparent;
            border-bottom-width: 10px;
            text-align: center;
        }

        .plate h2 {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 8px;
            min-height: 70px; /* 稍微调低一点点，防止在小屏幕下过长 */
        }

        .plate .super-power {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 5px;
            color: #334155;
        }

        .plate .feeling {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .plate.protein {
            background: var(--protein-bg);
            border-color: var(--protein-border);
            color: var(--protein-text);
        }

        .plate.carbs {
            background: var(--carbs-bg);
            border-color: var(--carbs-border);
            color: var(--carbs-text);
        }

        .plate.fiber {
            background: var(--fiber-bg);
            border-color: var(--fiber-border);
            color: var(--fiber-text);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .drop-zone {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255, 255, 255, 0.3); /* 加个半透明背景，即使没东西也好看 */
        }

        .placed-item {
            background: rgba(255, 255, 255, 0.85);
            padding: 6px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: popIn 0.3s;
        }

        #success-msg {
            display: none;
            text-align: center;
            margin-top: 30px;
            animation: fadeIn 0.5s;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="toast">Ready? 🚀</div>

    <div class="game-container">
        <header>
            <h1>🍳 Eva's Morning Cafe</h1>
            <p class="subtitle">嘿！把食物放进正确的超能力盘子里吧！</p>
        </header>

        <div id="food-bin"></div>

        <div class="plates-grid">
            <div class="plate protein" id="plate-protein" ondragover="allowDrop(event)"
                ondrop="handleDrop(event, 'protein')">
                <h2>PROTEIN</h2>
                <div class="super-power">“帮我长个子” 💪</div>
                <div class="feeling">想长高、想强壮选这个</div>
                <div class="drop-zone" id="protein-zone"></div>
            </div>
            <div class="plate carbs" id="plate-carbs" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'carbs')">
                <h2>CARBS</h2>
                <div class="super-power">“帮我有力气” ⚡️</div>
                <div class="feeling">想跑得快、有精神选这个</div>
                <div class="drop-zone" id="carbs-zone"></div>
            </div>
            <div class="plate fiber" id="plate-fiber" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'fiber')">
                <h2>FIBER</h2>
                <div class="super-power">“肚肚好舒服” 🧹</div>
                <div class="feeling">肚肚大扫除、不上火选这个</div>
                <div class="drop-zone" id="fiber-zone"></div>
            </div>
        </div>

        <div id="success-msg">
            <h2 style="color: #16a34a; font-size: 28px; font-weight: 900; margin: 0;">🏆 挑战成功！</h2>
            <p style="font-style: italic; color: var(--slate-500); margin-top: 10px;">"Small steps, big momentum. 微光致远。"
            </p>
        </div>
    </div>

    <script>
        const foodData = [
            { id: 1, name: 'Bacon', type: 'protein', icon: '🥓' },
            { id: 2, name: 'Egg', type: 'protein', icon: '🍳' },
            { id: 3, name: 'Milk', type: 'protein', icon: '🥛' },
            { id: 4, name: 'Bread', type: 'carbs', icon: '🍞' },
            { id: 5, name: 'Pancakes', type: 'carbs', icon: '🥞' },
            { id: 6, name: 'Honey', type: 'carbs', icon: '🍯' },
            { id: 7, name: 'Apple', type: 'fiber', icon: '🍎' },
            { id: 8, name: 'Banana', type: 'fiber', icon: '🍌' },
            { id: 9, name: 'Broccoli', type: 'fiber', icon: '🥦' },
            { id: 10, name: 'cucumber', type: 'fiber', icon: '🥒' },
        ].sort(() => Math.random() - 0.5);

        const bin = document.getElementById('food-bin');
        const toast = document.getElementById('toast');
        let remaining = foodData.length;

        function init() {
            foodData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'food-card';
                div.draggable = true;
                div.innerHTML = `<span>${item.icon}</span> ${item.name}`;
                div.id = `food-${item.id}`;
                div.dataset.type = item.type;
                div.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
                bin.appendChild(div);
            });
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function allowDrop(e) { e.preventDefault(); }

        function handleDrop(e, targetType) {
            e.preventDefault();
            const id = e.dataTransfer.getData("text");
            const el = document.getElementById(id);
            if (!el) return;

            const foodType = el.dataset.type;
            const foodName = el.innerText.split(' ')[1] || el.innerText;

            if (foodType === targetType) {
                const zone = document.getElementById(`${targetType}-zone`);
                const placed = document.createElement('div');
                placed.className = 'placed-item';
                placed.innerHTML = el.innerHTML;
                zone.appendChild(placed);
                el.style.display = 'none';
                remaining--;
                if (remaining === 0) document.getElementById('success-msg').style.display = 'block';
            } else {
                document.getElementById(`plate-${targetType}`).classList.add('shake');
                setTimeout(() => { document.getElementById(`plate-${targetType}`).classList.remove('shake'); }, 400);

                let hint = "";
                if (foodType === 'protein') hint = `放错啦！${foodName} 是帮我们“长个子”的 💪`;
                else if (foodType === 'carbs') hint = `不对哦！${foodName} 是给我们“力气”的 ⚡️`;
                else if (foodType === 'fiber') hint = `哎呀！${foodName} 是让“肚肚舒服”的 🧹`;

                showToast(hint);
            }
        }
        init();
    </script>
</body>

</html>
